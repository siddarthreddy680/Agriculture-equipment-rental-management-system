{% extends 'base.html' %}
{% load static %}

{% block main %}
<style>
    .container {
        max-width: 500px;
        margin: 50px auto;
        background-color: #ffffff41;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    }
    .vehicle-form .form-group {
        margin-bottom: 15px;
    }
    .vehicle-form label {
        font-weight: bold;
    }
    .vehicle-form input {
        width: 100%;
        padding: 8px;
        margin-right:50px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    .vehicle-form .btn {
        width: 100%;
        padding: 10px;
        background-color: #228b22;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    .vehicle-form .btn:hover {
        background-color: #1e7a1e;
    }
    </style>
    
<div class="container">
    <h2 class="text-center">Add Vehicle</h2>
    <form method="POST" action="" class="vehicle-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="name">Vehicle Name:</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="brand">Brand:</label>
            <input type="text" id="brand" name="brand" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="model">Model:</label>
            <input type="text" id="model" name="model" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="registration_number">Registration Number:</label>
            <input type="text" id="registration_number" name="registration_number" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="daily_rate">Daily Rate:</label>
            <input type="number" id="daily_rate" name="daily_rate" class="form-control" required>
        </div>
        
        <button type="submit" class="btn btn-primary">Add Vehicle</button>
    </form>
</div>
{% endblock %}
