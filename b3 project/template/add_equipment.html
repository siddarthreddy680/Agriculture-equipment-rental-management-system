{% extends 'base.html' %}
{% load static %}

{% block main %}
<div class="container">
    <h2 class="text-center">Add Equipment</h2>
    {% if messages %}
    {% for message in messages %}
    <p>{{message}}</p>
    {% endfor %}
    {% endif %}
    <form method="POST" action="" class="equipment-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="vehicle">Vehicle:</label>
            <select id="vehicle" name="vehicle" class="form-control" required disabled>
                {% for vehicle in vehicles %}
                <option value="{{ vehicle.id }}">{{ vehicle.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="name">Equipment Name:</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="category">Category:</label>
            <input type="text" id="category" name="category" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="description">Description:</label>
            <textarea id="description" name="description" class="form-control" required></textarea>
        </div>

        <div class="form-group">
            <label for="condition">Condition:</label>
            <select id="condition" name="condition" class="form-control" required>
                <option value="New">New</option>
                <option value="Used">Used</option>
            </select>
        </div>

        <div class="form-group">
            <label for="daily_rate">Daily Rate:</label>
            <input type="number" id="daily_rate" name="daily_rate" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Add Equipment</button>
    </form>
</div>

<style>
.container {
    max-width: 500px;
    margin: 50px auto;
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
}
.equipment-form .form-group {
    margin-bottom: 15px;
}
.equipment-form label {
    font-weight: bold;
}
.equipment-form input, .equipment-form select, .equipment-form textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
}
.equipment-form .btn {
    width: 100%;
    padding: 10px;
    background-color: #228b22;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.3s;
}
.equipment-form .btn:hover {
    background-color: #1e7a1e;
}
</style>

{% endblock %}
